name: Build EXE / App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: リポジトリを取得
      uses: actions/checkout@v4

    - name: Python 3.11 をセットアップ
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Pythonライブラリをインストール
      run: |
        pip install --upgrade pip
        pip install pikepdf pypdf pillow pyinstaller tkinterdnd2

    - name: EXEをビルド
      run: |
        $spec = @"
        # -*- mode: python -*-
        from PyInstaller.utils.hooks import collect_all

        datas_tk, binaries_tk, hiddenimports_tk = collect_all('tkinterdnd2')

        a = Analysis(
            ['bridge_pdf_link_app.py'],
            binaries=binaries_tk,
            datas=datas_tk,
            hiddenimports=hiddenimports_tk + ['PIL._tkinter_finder'],
        )
        pyz = PYZ(a.pure)
        exe = EXE(pyz, a.scripts, a.binaries, a.datas,
                  name='橋梁点検PDFリンク追加ツール',
                  console=False, onefile=True)
        "@
        $spec | Out-File -FilePath build.spec -Encoding utf8
        pyinstaller build.spec

    - name: ビルド成果物をアップロード
      uses: actions/upload-artifact@v4
      with:
        name: 橋梁点検PDFリンク追加ツール-Windows
        path: dist/橋梁点検PDFリンク追加ツール.exe
        retention-days: 30


